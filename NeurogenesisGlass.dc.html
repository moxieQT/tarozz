<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Интегрировано в React</title>
<style>
  body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    background: radial-gradient(130% 120% at 50% 110%, rgb(18, 30, 24) 0%, rgb(10, 22, 17) 100%);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: rgba(30, 41, 59, 0.4);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(99, 193, 138, 0.2);
    border-radius: 24px;
    padding: 40px;
    text-align: center;
    max-width: 480px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
  }
  h1 {
    font-size: 24px;
    font-weight: 600;
    margin: 0 0 16px 0;
    color: #34d399;
  }
  p {
    font-size: 14px;
    line-height: 1.6;
    color: #94a3b8;
    margin: 0 0 24px 0;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(52, 211, 153, 0.1);
    color: #34d399;
    font-family: monospace;
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 100px;
    border: 1px solid rgba(52, 211, 153, 0.2);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }
</style>
</head>
<body>
<div class="card">
  <h1>Успешно перенесено в React</h1>
  <p>Эта интерактивная 3D-модель нейрогенеза гиппокампа (все 5 стадий развития) теперь полностью встроена в основной интерфейс React-приложения <b>(компонент HippocampalView)</b>.</p>
  <div class="badge">● 3D WebGL Нейрогенез Активен</div>
</div>
</body>
</html>
